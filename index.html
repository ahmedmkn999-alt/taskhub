<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>TaskHub Pro | منصة الأرباح</title>

<meta name="mylead-verification" content="80164b4974f260341732958742e53526">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  :root {
    --bg: #07070d;
    --surface: #0f0f1a;
    --card: #13131f;
    --card2: #191928;
    --border: rgba(255,255,255,0.07);
    --accent: #7c6dfa;
    --accent-glow: rgba(124,109,250,0.3);
    --green: #00e5b0;
    --green-glow: rgba(0,229,176,0.25);
    --text: #f0f0f8;
    --muted: #6a6a90;
    --glass: rgba(20,20,35,0.85);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Cairo', sans-serif; }
  body { background: var(--bg); color: var(--text); padding-bottom: 90px; overflow-x: hidden; line-height: 1.6; }

  /* الهيدر العلوي بنظام الجلاس مورفيزم */
  .top-nav { background: var(--glass); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); padding: 18px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
  .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .logo-icon { width: 38px; height: 38px; background: linear-gradient(135deg, var(--accent), #b588f7); border-radius: 12px; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 15px var(--accent-glow); position: relative; overflow: hidden; }
  .logo-text { font-family: 'Space Grotesk', sans-serif; font-weight: 800; font-size: 1.35rem; color: var(--text); letter-spacing: -1px; }
  .logo-text span { color: var(--accent); }
  
  .points-badge { background: linear-gradient(90deg, #1a1a2e, #13131f); border: 1px solid var(--border); padding: 6px 16px; border-radius: 20px; display: flex; align-items: center; gap: 10px; box-shadow: inset 0 2px 10px rgba(0,0,0,0.4); border-left: 3px solid var(--green); }
  .points-count { color: var(--green); font-weight: 800; font-size: 1.05rem; }

  /* الصفحات */
  .page { display: none; padding: 20px; animation: pageIn 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
  .page.active { display: block; }
  @keyframes pageIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

  /* حاوية الفريم (المهام) */
  .iframe-container { width: 100%; height: 78vh; border-radius: 24px; overflow: hidden; border: 1px solid var(--border); background: var(--card); position: relative; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
  iframe { width: 100%; height: 100%; border: none; }

  /* القائمة السفلية */
  .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); display: grid; grid-template-columns: repeat(4, 1fr); padding: 12px 10px; border-top: 1px solid var(--border); z-index: 1000; border-radius: 24px 24px 0 0; }
  .nav-item { cursor: pointer; color: var(--muted); display: flex; flex-direction: column; align-items: center; gap: 6px; font-size: 0.72rem; font-weight: 600; transition: all 0.3s ease; position: relative; }
  .nav-item i { font-size: 1.35rem; transition: transform 0.3s ease; }
  .nav-item.active { color: var(--accent); }
  .nav-item.active i { transform: translateY(-4px); color: var(--accent); text-shadow: 0 0 15px var(--accent-glow); }

  /* بوت الشات العائم */
  #bot-widget { position: fixed; bottom: 100px; left: 24px; z-index: 1000; }
  .bot-trigger { width: 58px; height: 58px; background: linear-gradient(135deg, var(--accent), #5a4cf5); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 26px; cursor: pointer; box-shadow: 0 10px 25px var(--accent-glow); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
  .bot-trigger:active { transform: scale(0.9); }
  
  .chat-panel { display: none; width: 310px; height: 420px; background: var(--surface); border: 1px solid var(--border); border-radius: 24px; position: absolute; bottom: 75px; left: 0; flex-direction: column; box-shadow: 0 25px 60px rgba(0,0,0,0.8); overflow: hidden; animation: popUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
  @keyframes popUp { from { opacity: 0; transform: scale(0.9) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
  .chat-header { background: var(--card2); padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .chat-body { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
  .msg { padding: 10px 14px; border-radius: 16px; font-size: 0.82rem; max-width: 85%; }
  .msg.bot { background: var(--card2); align-self: flex-start; border-bottom-right-radius: 4px; border: 1px solid var(--border); }
  .msg.user { background: var(--accent); align-self: flex-end; border-bottom-left-radius: 4px; color: white; }
  .chat-input-area { padding: 12px 15px; background: var(--card); border-top: 1px solid var(--border); display: flex; gap: 10px; }
  .chat-input-area input { flex: 1; background: var(--surface); border: 1px solid var(--border); color: white; padding: 10px 15px; border-radius: 12px; font-size: 0.8rem; outline: none; }
  .send-btn { background: var(--accent); border: none; width: 38px; height: 38px; border-radius: 10px; color: white; cursor: pointer; }
</style>
</head>
<body>

<div class="top-nav">
  <a href="#" class="logo">
    <div class="logo-icon"><i class="fas fa-bolt text-white"></i></div>
    <div class="logo-text">Task<span>Hub</span> PRO</div>
  </a>
  <div class="points-badge">
    <i class="fas fa-coins" style="color:#ffd700"></i>
    <span class="points-count" id="user-points">0</span>
  </div>
</div>

<div id="p-tasks" class="page active">
  <div class="iframe-container">
    <iframe src="https://mylead.global/sl/df6920f3e660143899f7d0c9f1396f42?&subid=" allowfullscreen></iframe>
  </div>
</div>

<div id="p-withdraw" class="page">
  <div style="background:var(--card); padding:25px; border-radius:24px; border:1px solid var(--border);">
    <h3 style="margin-bottom:20px; color:var(--green)">💸 سحب الأرباح فودافون كاش</h3>
    <input type="tel" placeholder="رقم فودافون كاش" style="width:100%; padding:15px; background:var(--bg); border:1px solid var(--border); color:white; border-radius:12px; margin-bottom:12px; outline:none;">
    <button style="width:100%; padding:16px; background:var(--accent); border:none; color:white; border-radius:12px; font-weight:bold; cursor:pointer;">طلب تحويل النقاط</button>
  </div>
</div>

<div id="bot-widget">
  <div class="bot-trigger" onclick="toggleChat()">🤖</div>
  <div class="chat-panel" id="chatPanel">
    <div class="chat-header">
      <div style="display:flex; align-items:center; gap:8px;">
        <div style="width:8px; height:8px; background:var(--green); border-radius:50%"></div>
        <span style="font-weight:700; font-size:0.9rem;">مساعد TaskHub 🤖</span>
      </div>
      <i class="fas fa-times" style="cursor:pointer; color:var(--muted)" onclick="toggleChat()"></i>
    </div>
    <div class="chat-body" id="chatBody">
      <div class="msg bot">أهلاً بك! أنا مساعدك الذكي. واجهت أي مشكلة في تنفيذ المهام؟</div>
    </div>
    <div class="chat-input-area">
      <input type="text" id="chatInput" placeholder="اكتب سؤالك...">
      <button class="send-btn" onclick="sendChat()"><i class="fas fa-paper-plane"></i></button>
    </div>
  </div>
</div>

<div class="bottom-nav">
  <div class="nav-item active" onclick="changePage('p-tasks')"><i class="fas fa-tasks"></i>المهام</div>
  <div class="nav-item" onclick="changePage('p-withdraw')"><i class="fas fa-wallet"></i>السحب</div>
  <div class="nav-item" onclick="toggleChat()"><i class="fas fa-headset"></i>الدعم</div>
  <div class="nav-item"><i class="fas fa-user-circle"></i>حسابي</div>
</div>

<script>
  function changePage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    event.currentTarget.classList.add('active');
  }

  function toggleChat() {
    const panel = document.getElementById('chatPanel');
    panel.style.display = (panel.style.display === 'flex') ? 'none' : 'flex';
  }

  function sendChat() {
    const input = document.getElementById('chatInput');
    const body = document.getElementById('chatBody');
    if(!input.value.trim()) return;

    body.innerHTML += `<div class="msg user">${input.value}</div>`;
    let reply = "جاري تحويل استفسارك لقسم الدعم الفني، شكراً لصبرك.";
    if(input.value.includes("سحب")) reply = "السحب بيوصل في خلال 24 ساعة، اتأكد إن رقمك صح.";
    
    setTimeout(() => {
      body.innerHTML += `<div class="msg bot">${reply}</div>`;
      body.scrollTop = body.scrollHeight;
    }, 700);
    input.value = "";
  }
</script>
</body>
</html>
