<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TaskHub | منصة المهام</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0a0f; --card: #16161e; --accent: #6c63ff; --accent2: #00d4aa; --text: #ffffff; --muted: #7070a0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
  body { background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

  /* تنسيق شاشة الدخول - منع التداخل */
  .auth-container { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
  .auth-box { background: var(--card); padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; border: 1px solid #2a2a3a; text-align: center; }
  .logo { font-size: 2.5rem; font-weight: 900; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; }
  
  input { width: 100%; padding: 12px; margin-bottom: 15px; background: #000; border: 1px solid #2a2a3a; border-radius: 10px; color: #fff; outline: none; transition: 0.3s; }
  input:focus { border-color: var(--accent); }
  
  .btn { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
  .btn-primary { background: var(--accent); color: #fff; margin-bottom: 10px; }
  .btn-primary:hover { background: #5a52d4; }

  /* تنسيق واجهة المستخدم (الداشبورد) */
  #dashboard, #admin-panel { display: none; padding: 20px; max-width: 600px; margin: auto; }
  .balance-card { background: linear-gradient(135deg, #1a1040, #0a0a0f); padding: 30px; border-radius: 20px; border: 1px solid var(--accent); text-align: center; margin-bottom: 20px; }
  .balance-val { font-size: 3rem; font-weight: 900; color: var(--accent2); }

  /* لوحة التحكم (الأدمن) */
  .admin-card { background: #1a1a24; border: 1px solid var(--accent2); padding: 20px; border-radius: 15px; margin-top: 20px; }
  
  iframe { width: 100%; height: 500px; border-radius: 15px; border: none; background: #fff; margin-top: 15px; }
</style>
</head>
<body>

<div id="auth-screen" class="auth-container">
  <div class="auth-box">
    <div class="logo">TaskHub</div>
    <input type="email" id="email" placeholder="البريد الإلكتروني" />
    <input type="password" id="pass" placeholder="كلمة المرور" />
    <button class="btn btn-primary" onclick="handleAuth()">دخول / تسجيل</button>
    <p id="auth-msg" style="font-size: 0.8rem; color: var(--muted);"></p>
  </div>
</div>

<div id="dashboard">
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
    <h3>أهلاً بك 🚀</h3>
    <button onclick="logout()" style="color: red; background: none; border: none; cursor: pointer;">خروج</button>
  </div>
  <div class="balance-card">
    <p>رصيدك الحالي</p>
    <div class="balance-val" id="user-points">0</div>
    <p>نقطة</p>
  </div>
  <h4>🎯 المهام المتاحة</h4>
  <iframe id="offerwall" src=""></iframe>
</div>

<div id="admin-panel">
  <div style="display: flex; justify-content: space-between; align-items: center;">
    <h2 style="color: var(--accent2);">لوحة تحكم أحمد ⚙️</h2>
    <button onclick="logout()" style="color: red; background: none; border: none; cursor: pointer;">خروج</button>
  </div>
  <div class="admin-card">
    <h3>تعديل نقاط مستخدم</h3>
    <input type="text" id="target-uid" placeholder="UID المستخدم" />
    <input type="number" id="new-points" placeholder="عدد النقاط" />
    <button class="btn btn-primary" onclick="updatePoints()">تحديث النقاط</button>
  </div>
  <div class="admin-card">
    <h3>طلبات السحب المعلقة</h3>
    <p style="color: var(--muted);">سيتم عرض الطلبات هنا قريباً...</p>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// إعدادات Firebase الخاصة بك
const firebaseConfig = {
  apiKey: "AIzaSyDwMOax-amBzEm3FDjXKN8yBbB3cXNbb14",
  authDomain: "taskhub-9d282.firebaseapp.com",
  projectId: "taskhub-9d282",
  storageBucket: "taskhub-9d282.firebasestorage.app",
  messagingSenderId: "981675153894",
  appId: "1:981675153894:web:380c4194bb4ea9e1f51e27"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const ADMIN_EMAIL = "ahmedmkn999@gmail.com";

// التحقق من حالة الدخول
onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById("auth-screen").style.display = "none";
    if (user.email === ADMIN_EMAIL) {
      document.getElementById("admin-panel").style.display = "block";
    } else {
      document.getElementById("dashboard").style.display = "block";
      loadUserData(user.uid);
    }
  } else {
    document.getElementById("auth-screen").style.display = "flex";
    document.getElementById("dashboard").style.display = "none";
    document.getElementById("admin-panel").style.display = "none";
  }
});

// دالة الدخول والتسجيل التلقائي
window.handleAuth = async () => {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch (e) {
    try {
      const res = await createUserWithEmailAndPassword(auth, email, pass);
      await setDoc(doc(db, "users", res.user.uid), { email, points: 0 });
    } catch (err) { alert("خطأ في الدخول: " + err.message); }
  }
};

function loadUserData(uid) {
  onSnapshot(doc(db, "users", uid), (snap) => {
    if(snap.exists()) document.getElementById("user-points").innerText = snap.data().points || 0;
  });
  document.getElementById("offerwall").src = `https://reward-me.eu/02ae0b4a-277d-11f1-8c8f-129a1c289511?uid=${uid}`;
}

window.updatePoints = async () => {
  const uid = document.getElementById("target-uid").value;
  const pts = document.getElementById("new-points").value;
  await updateDoc(doc(db, "users", uid), { points: parseInt(pts) });
  alert("تم التحديث!");
};

window.logout = () => signOut(auth);
</script>
</body>
</html>
