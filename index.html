<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TaskHub | منصة العظمة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0a0f; --card: #16161e; --accent: #6c63ff; --accent2: #00d4aa; --text: #ffffff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
  
  /* حل مشكلة التجميد - السماح بالسكورول */
  body { 
    background: var(--bg); color: var(--text); 
    min-height: 100vh; overflow-y: auto !important; 
    padding-bottom: 100px;
  }

  /* تنسيق الهيدر */
  header { background: var(--card); padding: 15px; display: flex; justify-content: space-between; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #2a2a3a; }
  
  /* كروت الإحصائيات عشان الصفحة متبقاش فاضية */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px; }
  .stat-card { background: var(--card); padding: 15px; border-radius: 15px; text-align: center; border: 1px solid #2a2a3a; }
  .stat-card h5 { color: #7070a0; font-size: 0.8rem; }
  .stat-card p { font-size: 1.2rem; font-weight: bold; color: var(--accent2); }

  /* البطاقة الرئيسية للرصيد */
  .balance-card { background: linear-gradient(135deg, #1a1040, #0a0a0f); margin: 20px; padding: 30px; border-radius: 20px; text-align: center; border: 1px solid var(--accent); }
  .balance-val { font-size: 3rem; font-weight: 900; color: #fff; }

  /* حائط العروض */
  .offer-section { margin: 20px; }
  iframe { width: 100%; height: 600px; border-radius: 20px; border: 2px solid var(--accent); background: #fff; }

  /* المساعد الذكي (Chatbot) */
  #smart-bot { position: fixed; bottom: 20px; left: 20px; z-index: 2000; }
  .bot-btn { width: 60px; height: 60px; border-radius: 50%; background: var(--accent); border: none; font-size: 30px; cursor: pointer; box-shadow: 0 5px 15px rgba(108,99,255,0.4); }
  .bot-window { display: none; position: absolute; bottom: 70px; left: 0; width: 280px; background: var(--card); border: 1px solid #2a2a3a; border-radius: 15px; flex-direction: column; overflow: hidden; }
  .bot-window.active { display: flex; }
  .bot-header { background: var(--accent); padding: 10px; font-weight: bold; text-align: center; }
  .bot-body { height: 200px; padding: 10px; overflow-y: auto; font-size: 0.9rem; }
  .bot-msg { background: #2a2a3a; padding: 8px; border-radius: 10px; margin-bottom: 10px; }
  .user-msg { background: var(--accent); padding: 8px; border-radius: 10px; margin-bottom: 10px; align-self: flex-end; }
  .bot-input { display: flex; border-top: 1px solid #2a2a3a; }
  .bot-input input { flex: 1; padding: 10px; background: transparent; border: none; color: #fff; outline: none; }

  /* الدعم الفني */
  .support-link { text-align: center; margin-top: 20px; color: var(--accent2); text-decoration: none; display: block; }
</style>
</head>
<body>

<div id="dashboard" style="display: block;">
  <header>
    <h2 style="color: var(--accent);">TaskHub 🚀</h2>
    <button onclick="logout()" style="color: red; background: none; border: none; font-weight: bold;">خروج</button>
  </header>

  <div class="stats-grid">
    <div class="stat-card"><h5>مهام منجزة</h5><p>0</p></div>
    <div class="stat-card"><h5>سحوبات ناجحة</h5><p>0</p></div>
  </div>

  <div class="balance-card">
    <p style="color: #7070a0;">رصيدك الحالي</p>
    <div class="balance-val" id="points-display">0</div>
    <p>نقطة</p>
  </div>

  <div class="offer-section">
    <h3 style="margin-bottom: 15px;">🎯 حائط المهام</h3>
    <iframe id="offerwall-frame" src="https://reward-me.eu/02ae0b4a-277d-11f1-8c8f-129a1c289511"></iframe>
  </div>

  <a href="mailto:ahmedmkn999@gmail.com" class="support-link">📧 تواصل مع الدعم الفني</a>
</div>

<div id="smart-bot">
  <button class="bot-btn" onclick="toggleBot()">🤖</button>
  <div class="bot-window" id="botWindow">
    <div class="bot-header">مساعد TaskHub الذكي</div>
    <div class="bot-body" id="botMsgs">
      <div class="bot-msg">أهلاً بك يا بطل! أنا هنا لمساعدتك. اسألني عن (السحب، النقاط، أو الدعم).</div>
    </div>
    <div class="bot-input">
      <input type="text" id="botIn" placeholder="اكتب سؤالك...">
      <button onclick="askBot()" style="padding: 10px; background: var(--accent2); border: none;">➔</button>
    </div>
  </div>
</div>

<script type="module">
  // ... (نفس كود Firebase اللي معاك فوق حطه هنا) ...
  
  // دالة الشات بوت الذكي
  window.toggleBot = () => document.getElementById('botWindow').classList.toggle('active');
  window.askBot = () => {
    const input = document.getElementById('botIn');
    const msgs = document.getElementById('botMsgs');
    if(!input.value) return;
    
    msgs.innerHTML += `<div class="user-msg">${input.value}</div>`;
    let reply = "عذراً، لم أفهمك جيداً. يمكنك مراسلة الإدارة عبر البريد الإلكتروني.";
    if(input.value.includes("سحب")) reply = "السحب يتم خلال 24 ساعة عبر فودافون كاش.";
    if(input.value.includes("نقط")) reply = "تأكد من إغلاق الـ VPN لضمان احتساب النقاط.";
    
    setTimeout(() => {
      msgs.innerHTML += `<div class="bot-msg">${reply}</div>`;
      msgs.scrollTop = msgs.scrollHeight;
    }, 500);
    input.value = "";
  };
</script>
</body>
</html>
