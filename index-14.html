<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>منصة المهام</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:       #0a0a0f;
    --surface:  #13131a;
    --card:     #1a1a24;
    --border:   #2a2a3a;
    --accent:   #6c63ff;
    --accent2:  #00d4aa;
    --danger:   #ff4f6a;
    --text:     #e8e8f0;
    --muted:    #7070a0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Auth Screen ── */
  #auth-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
    background: radial-gradient(ellipse at 60% 20%, #1a1040 0%, var(--bg) 70%);
  }

  .logo {
    font-size: 2.8rem;
    font-weight: 900;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: .4rem;
    letter-spacing: -1px;
  }

  .tagline { color: var(--muted); font-size: .95rem; margin-bottom: 2.5rem; }

  .auth-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2rem;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 20px 60px rgba(108,99,255,.15);
  }

  .auth-box h2 { font-size: 1.3rem; font-weight: 700; margin-bottom: 1.4rem; text-align: center; }

  .field { margin-bottom: 1rem; }
  .field label { display: block; font-size: .82rem; color: var(--muted); margin-bottom: .4rem; }

  input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: .75rem 1rem;
    color: var(--text);
    font-family: inherit;
    font-size: .95rem;
    outline: none;
    transition: border-color .2s;
  }
  input:focus { border-color: var(--accent); }

  .btn {
    width: 100%;
    padding: .85rem;
    border: none;
    border-radius: 12px;
    font-family: inherit;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity .2s, transform .1s;
  }
  .btn:active { transform: scale(.97); }
  .btn-primary { background: linear-gradient(135deg, var(--accent), #9b95ff); color: #fff; margin-top: .5rem; }
  .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); margin-top: .6rem; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }

  .switch-link { text-align: center; margin-top: 1rem; font-size: .85rem; color: var(--muted); }
  .switch-link span { color: var(--accent); cursor: pointer; font-weight: 600; }

  /* ── Dashboard ── */
  #dashboard { display: none; }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  header .logo-sm {
    font-size: 1.4rem;
    font-weight: 900;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .user-info { font-size: .8rem; color: var(--muted); text-align: left; }
  .logout-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: .4rem .8rem;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    font-size: .8rem;
    transition: color .2s;
  }
  .logout-btn:hover { color: var(--danger); border-color: var(--danger); }

  main { padding: 1.5rem; max-width: 500px; margin: 0 auto; }

  /* Balance Card */
  .balance-card {
    background: linear-gradient(135deg, #1a1040, #0d1f3c);
    border: 1px solid #2a2060;
    border-radius: 20px;
    padding: 1.8rem;
    margin-bottom: 1.2rem;
    position: relative;
    overflow: hidden;
  }
  .balance-card::before {
    content: '';
    position: absolute;
    top: -40px; left: -40px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(108,99,255,.2), transparent 70%);
    pointer-events: none;
  }
  .balance-label { font-size: .82rem; color: #8888bb; margin-bottom: .3rem; }
  .balance-value {
    font-size: 3.2rem;
    font-weight: 900;
    line-height: 1;
    background: linear-gradient(135deg, #fff, var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .balance-unit { font-size: 1rem; color: #8888bb; margin-top: .3rem; }

  /* Action Buttons */
  .actions { display: grid; grid-template-columns: 1fr 1fr; gap: .8rem; margin-bottom: 1.2rem; }
  .action-btn {
    padding: 1rem;
    border-radius: 14px;
    border: none;
    font-family: inherit;
    font-weight: 700;
    font-size: .95rem;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s;
    display: flex; align-items: center; justify-content: center; gap: .5rem;
  }
  .action-btn:active { transform: scale(.96); }
  .btn-earn {
    background: linear-gradient(135deg, var(--accent2), #00b894);
    color: #000;
    grid-column: 1 / -1;
    font-size: 1.05rem;
    padding: 1.1rem;
    box-shadow: 0 8px 24px rgba(0,212,170,.2);
  }
  .btn-withdraw {
    background: var(--card);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-history {
    background: var(--card);
    color: var(--text);
    border: 1px solid var(--border);
  }

  /* Section Card */
  .section-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.4rem;
    margin-bottom: 1.2rem;
    display: none;
  }
  .section-card.active { display: block; }
  .section-card h3 {
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 1rem;
    display: flex; align-items: center; gap: .5rem;
  }
  .close-btn {
    margin-right: auto;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1rem;
  }

  /* Offerwall iframe */
  #offerwall-frame {
    width: 100%;
    height: 420px;
    border: none;
    border-radius: 10px;
    background: var(--surface);
  }

  /* Withdraw form */
  .withdraw-form .field { margin-bottom: .9rem; }
  .msg {
    text-align: center;
    font-size: .88rem;
    padding: .7rem;
    border-radius: 8px;
    margin-top: .8rem;
    display: none;
  }
  .msg.success { background: rgba(0,212,170,.1); color: var(--accent2); display: block; }
  .msg.error   { background: rgba(255,79,106,.1); color: var(--danger); display: block; }

  /* Transactions list */
  .tx-list { display: flex; flex-direction: column; gap: .6rem; }
  .tx-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: .7rem .9rem;
    background: var(--surface);
    border-radius: 10px;
    font-size: .88rem;
  }
  .tx-item .tx-id { color: var(--muted); font-size: .78rem; }
  .tx-amount { font-weight: 700; color: var(--accent2); }
  .empty { color: var(--muted); text-align: center; padding: 1rem; font-size: .9rem; }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 2rem; left: 50%;
    transform: translateX(-50%) translateY(4rem);
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: .7rem 1.4rem;
    border-radius: 30px;
    font-size: .88rem;
    box-shadow: 0 8px 24px rgba(0,0,0,.4);
    transition: transform .3s ease;
    z-index: 100;
    white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- ══ AUTH SCREEN ══ -->
<div id="auth-screen">
  <div class="logo">TaskHub</div>
  <p class="tagline">اكسب نقاط وحوّلها لفلوس حقيقية</p>

  <div class="auth-box" id="login-box">
    <h2>تسجيل الدخول</h2>
    <div class="field">
      <label>البريد الإلكتروني</label>
      <input type="email" id="login-email" placeholder="email@example.com" />
    </div>
    <div class="field">
      <label>كلمة المرور</label>
      <input type="password" id="login-pass" placeholder="••••••••" />
    </div>
    <button class="btn btn-primary" onclick="doLogin()">دخول</button>
    <p class="switch-link">مش عندك حساب؟ <span onclick="toggleAuth()">سجّل دلوقتي</span></p>
  </div>

  <div class="auth-box" id="register-box" style="display:none">
    <h2>إنشاء حساب جديد</h2>
    <div class="field">
      <label>الاسم</label>
      <input type="text" id="reg-name" placeholder="اسمك" />
    </div>
    <div class="field">
      <label>البريد الإلكتروني</label>
      <input type="email" id="reg-email" placeholder="email@example.com" />
    </div>
    <div class="field">
      <label>كلمة المرور</label>
      <input type="password" id="reg-pass" placeholder="••••••••" />
    </div>
    <button class="btn btn-primary" onclick="doRegister()">إنشاء حساب</button>
    <p class="switch-link">عندك حساب؟ <span onclick="toggleAuth()">سجّل دخول</span></p>
  </div>
</div>

<!-- ══ DASHBOARD ══ -->
<div id="dashboard">
  <header>
    <div class="logo-sm">TaskHub</div>
    <div class="user-info" id="user-email-display"></div>
    <button class="logout-btn" onclick="doLogout()">خروج</button>
  </header>

  <main>
    <!-- Balance -->
    <div class="balance-card">
      <div class="balance-label">رصيدك الحالي</div>
      <div class="balance-value" id="points-display">0</div>
      <div class="balance-unit">نقطة</div>
    </div>

    <!-- Actions -->
    <div class="actions">
      <button class="action-btn btn-earn" onclick="toggleSection('earn-section')">
        🎯 اكسب نقاط — ابدأ المهام
      </button>
      <button class="action-btn btn-withdraw" onclick="toggleSection('withdraw-section')">
        💸 سحب
      </button>
      <button class="action-btn btn-history" onclick="loadHistory(); toggleSection('history-section')">
        📋 السجل
      </button>
    </div>

    <!-- Earn Section -->
    <div class="section-card" id="earn-section">
      <h3>🎯 المهام المتاحة <button class="close-btn" onclick="toggleSection('earn-section')">✕</button></h3>
      <iframe id="offerwall-frame" src="" title="Offerwall"></iframe>
    </div>

    <!-- Withdraw Section -->
    <div class="section-card" id="withdraw-section">
      <h3>💸 طلب سحب <button class="close-btn" onclick="toggleSection('withdraw-section')">✕</button></h3>
      <div class="withdraw-form">
        <div class="field">
          <label>رقم فودافون كاش</label>
          <input type="tel" id="w-phone" placeholder="01xxxxxxxxx" />
        </div>
        <div class="field">
          <label>عدد النقاط</label>
          <input type="number" id="w-amount" placeholder="100" min="1" />
        </div>
        <button class="btn btn-primary" onclick="doWithdraw()">إرسال الطلب</button>
        <div class="msg" id="w-msg"></div>
      </div>
    </div>

    <!-- History Section -->
    <div class="section-card" id="history-section">
      <h3>📋 آخر المعاملات <button class="close-btn" onclick="toggleSection('history-section')">✕</button></h3>
      <div class="tx-list" id="tx-list">
        <div class="empty">جاري التحميل...</div>
      </div>
    </div>
  </main>
</div>

<div id="toast"></div>

<!-- ══ FIREBASE SDK ══ -->
<script type="module">
import { initializeApp }              from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword,
         signInWithEmailAndPassword, signOut,
         onAuthStateChanged }         from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc,
         onSnapshot, addDoc, collection,
         query, where, orderBy, limit,
         getDocs, serverTimestamp }   from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ════════════════════════════════════════
// 🔧 ضع إعدادات Firebase بتاعتك هنا
// ════════════════════════════════════════
const firebaseConfig = {
  apiKey:            "AIzaSyDwMOax-amBzEm3FDjXKN8yBbB3cXNbb14",
  authDomain:        "taskhub-9d282.firebaseapp.com",
  projectId:         "taskhub-9d282",
  storageBucket:     "taskhub-9d282.firebasestorage.app",
  messagingSenderId: "981675153894",
  appId:             "1:981675153894:web:380c4194bb4ea9e1f51e27",
  measurementId:     "G-W3YLPQ27YS"
};

// ════════════════════════════════════════
// 🔧 رابط الـ Offerwall بتاعك
// ════════════════════════════════════════
const OFFERWALL_URL = "https://reward-me.eu/02ae0b4a-277b-11f1-8c8f-129a1c289511";

// ── Init ──────────────────────────────
const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

let currentUser = null;
let unsubPoints = null;

// ── Auth State ────────────────────────
onAuthStateChanged(auth, async (user) => {
  if (user) {
    currentUser = user;
    document.getElementById("auth-screen").style.display  = "none";
    document.getElementById("dashboard").style.display    = "block";
    document.getElementById("user-email-display").textContent = user.email;

    // Real-time points listener
    if (unsubPoints) unsubPoints();
    const userRef = doc(db, "users", user.uid);
    unsubPoints = onSnapshot(userRef, (snap) => {
      const pts = snap.exists() ? (snap.data().points ?? 0) : 0;
      document.getElementById("points-display").textContent = pts.toLocaleString("ar-EG");
    });

    // Set offerwall iframe src
    document.getElementById("offerwall-frame").src =
      `${OFFERWALL_URL}?uid=${user.uid}`;
  } else {
    currentUser = null;
    document.getElementById("auth-screen").style.display  = "flex";
    document.getElementById("dashboard").style.display    = "none";
    if (unsubPoints) { unsubPoints(); unsubPoints = null; }
  }
});

// ── Auth Actions ──────────────────────
window.doLogin = async () => {
  const email = document.getElementById("login-email").value.trim();
  const pass  = document.getElementById("login-pass").value;
  if (!email || !pass) return showToast("أدخل البريد وكلمة المرور");
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch (e) {
    showToast(getFriendlyError(e.code));
  }
};

window.doRegister = async () => {
  const name  = document.getElementById("reg-name").value.trim();
  const email = document.getElementById("reg-email").value.trim();
  const pass  = document.getElementById("reg-pass").value;
  if (!name || !email || !pass) return showToast("أكمل جميع الحقول");
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pass);
    // إنشاء document للمستخدم في Firestore
    await setDoc(doc(db, "users", cred.user.uid), {
      uid: cred.user.uid,
      email,
      displayName: name,
      points: 0,
      createdAt: serverTimestamp()
    });
  } catch (e) {
    showToast(getFriendlyError(e.code));
  }
};

window.doLogout = async () => {
  await signOut(auth);
};

// ── Withdraw ──────────────────────────
window.doWithdraw = async () => {
  const phone  = document.getElementById("w-phone").value.trim();
  const amount = parseFloat(document.getElementById("w-amount").value);
  const msgEl  = document.getElementById("w-msg");
  msgEl.className = "msg";

  if (!phone || isNaN(amount) || amount <= 0) {
    msgEl.textContent = "❌ أدخل رقم فودافون كاش والمبلغ";
    msgEl.className = "msg error"; return;
  }

  // تحقق من الرصيد
  const snap = await getDoc(doc(db, "users", currentUser.uid));
  const pts  = snap.exists() ? (snap.data().points ?? 0) : 0;
  if (amount > pts) {
    msgEl.textContent = "❌ رصيدك مش كفاية";
    msgEl.className = "msg error"; return;
  }

  try {
    await addDoc(collection(db, "withdrawals"), {
      uid: currentUser.uid,
      phone,
      amount,
      status: "pending",
      createdAt: serverTimestamp(),
      updatedAt: serverTimestamp()
    });
    msgEl.textContent = "✅ تم إرسال الطلب — هيراجعه الأدمن قريباً";
    msgEl.className = "msg success";
    document.getElementById("w-phone").value  = "";
    document.getElementById("w-amount").value = "";
  } catch (e) {
    msgEl.textContent = "❌ حدث خطأ، حاول مرة تانية";
    msgEl.className = "msg error";
  }
};

// ── Transaction History ───────────────
window.loadHistory = async () => {
  const listEl = document.getElementById("tx-list");
  listEl.innerHTML = '<div class="empty">جاري التحميل...</div>';
  try {
    const q = query(
      collection(db, "transactions"),
      where("uid", "==", currentUser.uid),
      orderBy("createdAt", "desc"),
      limit(20)
    );
    const snap = await getDocs(q);
    if (snap.empty) {
      listEl.innerHTML = '<div class="empty">لا يوجد معاملات بعد</div>';
      return;
    }
    listEl.innerHTML = "";
    snap.forEach(d => {
      const tx = d.data();
      listEl.innerHTML += `
        <div class="tx-item">
          <div>
            <div>${tx.source ?? "offerwall"}</div>
            <div class="tx-id">${tx.transId}</div>
          </div>
          <div class="tx-amount">+${tx.amount} نقطة</div>
        </div>`;
    });
  } catch (e) {
    listEl.innerHTML = '<div class="empty">حدث خطأ في التحميل</div>';
  }
};

// ── Toggle Sections ───────────────────
window.toggleSection = (id) => {
  const sections = ["earn-section","withdraw-section","history-section"];
  sections.forEach(s => {
    const el = document.getElementById(s);
    if (s === id) el.classList.toggle("active");
    else el.classList.remove("active");
  });
};

// ── Helpers ───────────────────────────
window.toggleAuth = () => {
  const l = document.getElementById("login-box");
  const r = document.getElementById("register-box");
  l.style.display = l.style.display === "none" ? "block" : "none";
  r.style.display = r.style.display === "none" ? "block" : "none";
};

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 3000);
}

function getFriendlyError(code) {
  const map = {
    "auth/invalid-email":         "البريد الإلكتروني غير صحيح",
    "auth/user-not-found":        "الحساب مش موجود",
    "auth/wrong-password":        "كلمة المرور غلط",
    "auth/email-already-in-use":  "البريد ده مسجّل قبل كده",
    "auth/weak-password":         "كلمة المرور ضعيفة (6 أحرف على الأقل)",
  };
  return map[code] ?? "حدث خطأ، حاول مرة تانية";
}

// ══════════════════════════════════════════
// 🔒 SECURITY LAYER
// ══════════════════════════════════════════

// 1️⃣ منع الـ F12 وأدوات المطور
document.addEventListener("keydown", (e) => {
  if (
    e.key === "F12" ||
    (e.ctrlKey && e.shiftKey && ["I","J","C","U"].includes(e.key)) ||
    (e.ctrlKey && e.key === "U")
  ) { e.preventDefault(); return false; }
});

// 2️⃣ منع الكليك اليمين
document.addEventListener("contextmenu", (e) => e.preventDefault());

// 3️⃣ كشف لو فتح DevTools وتسجيل خروج فوري
(function detectDevTools() {
  const threshold = 160;
  setInterval(() => {
    const widthDiff  = window.outerWidth  - window.innerWidth  > threshold;
    const heightDiff = window.outerHeight - window.innerHeight > threshold;
    if (widthDiff || heightDiff) {
      document.body.innerHTML = `
        <div style="display:flex;align-items:center;justify-content:center;
        height:100vh;background:#0a0a0f;color:#ff4f6a;font-family:Cairo,sans-serif;
        font-size:1.4rem;text-align:center;padding:2rem;">
          🚫 غير مسموح بفتح أدوات المطور
        </div>`;
    }
  }, 1000);
})();

// 4️⃣ منع النسخ والسيليكت
document.addEventListener("copy",      (e) => e.preventDefault());
document.addEventListener("selectstart",(e) => e.preventDefault());

// 5️⃣ Rate limiting للـ Auth — منع brute force
const loginAttempts = { count: 0, lastReset: Date.now() };
const _origLogin = window.doLogin;
window.doLogin = async () => {
  const now = Date.now();
  if (now - loginAttempts.lastReset > 60000) {
    loginAttempts.count = 0;
    loginAttempts.lastReset = now;
  }
  loginAttempts.count++;
  if (loginAttempts.count > 5) {
    showToast("⛔ كتير أوي — استنى دقيقة وحاول تاني");
    return;
  }
  await _origLogin();
};

// 6️⃣ منع الـ iframe embedding (Clickjacking)
if (window.top !== window.self) {
  window.top.location = window.self.location;
}
</script>
</body>
</html>
