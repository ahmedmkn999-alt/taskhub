<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskHub | تسجيل الدخول</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #6c63ff; --bg: #0a0a0f; --card: #1a1a24; }
        body { font-family: 'Cairo'; background: var(--bg); color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .auth-card { background: var(--card); padding: 40px; border-radius: 20px; width: 380px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; border: 1px solid #2a2a3a; }
        h2 { color: var(--accent); margin-bottom: 25px; }
        input { width: 100%; padding: 14px; margin: 10px 0; background: #0a0a0f; border: 1px solid #2a2a3a; color: white; border-radius: 10px; outline: none; }
        button { width: 100%; padding: 14px; background: var(--accent); border: none; color: white; font-weight: bold; border-radius: 10px; cursor: pointer; transition: 0.3s; margin-top: 15px; }
        button:hover { opacity: 0.9; transform: scale(1.02); }
        .toggle-link { margin-top: 20px; font-size: 14px; color: #7070a0; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h2 id="title">تسجيل الدخول</h2>
        <input type="email" id="email" placeholder="البريد الإلكتروني">
        <input type="password" id="pass" placeholder="كلمة المرور">
        <button id="authBtn">دخول</button>
        <div class="toggle-link" id="toggleAuth">ليس لديك حساب؟ سجل الآن</div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        let isLogin = true;
        const toggle = document.getElementById('toggleAuth');
        const authBtn = document.getElementById('authBtn');

        toggle.onclick = () => {
            isLogin = !isLogin;
            document.getElementById('title').innerText = isLogin ? "تسجيل الدخول" : "إنشاء حساب جديد";
            authBtn.innerText = isLogin ? "دخول" : "إنشاء حساب";
            toggle.innerText = isLogin ? "ليس لديك حساب؟ سجل الآن" : "لديك حساب بالفعل؟ سجل دخول";
        };

        authBtn.onclick = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            try {
                if (isLogin) {
                    await signInWithEmailAndPassword(auth, email, pass);
                } else {
                    const res = await createUserWithEmailAndPassword(auth, email, pass);
                    await setDoc(doc(db, "users", res.user.uid), { email, points: 0, status: "active" });
                }
                window.location.href = "index.html";
            } catch (e) { alert("عفواً: " + e.message); }
        };
    </script>
</body>
</html>
